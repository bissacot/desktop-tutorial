name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
        uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Executar testes
        run: |
          pytest --junitxml=report.xml
      - name: Salvar relatório de testes
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes
          path: report.xml

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build do pacote
        run: |
          python setup.py sdist || echo "Nenhum setup.py encontrado, build simbólico."
      - name: Salvar pacote
        uses: actions/upload-artifact@v4
        with:
          name: pacote-build
          path: dist/*
        if: success()

  deploy:
    needs: [build, notify]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      - name: Deploy simbólico
        run: |
          echo "Deploy realizado (ajuste conforme sua estratégia)."

  notify:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Notificar por e-mail
        env:
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}
        run: |
          echo "Pipeline finalizado. Status: ${{ job.status }}" | mail -s "Status do Pipeline" "$EMAIL_DESTINO"
