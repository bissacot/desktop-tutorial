name: CI/CD Pipeline

# Pipeline de Integração Contínua e Entrega Contínua (CI/CD)
# Etapas: Testes, Build, Notificação e Deploy automático via GitHub Actions

on:
  push:
    branches: [ main ]  # Executa em pushs na main
  pull_request:
    branches: [ main ]  # Executa em PRs para a main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # 1. Faz checkout do código
      - name: Checkout do código
        uses: actions/checkout@v4
      # 2. Configura o Python
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      # 3. Instala as dependências do projeto
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      # 4. Executa os testes unitários e gera relatório em XML
      - name: Executar testes
        run: |
          pytest --junitxml=report.xml
      # 5. Salva o relatório de testes como artifact
      - name: Salvar relatório de testes
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes
          path: report.xml

  build:
    needs: test  # Só executa se os testes passarem
    runs-on: ubuntu-latest
    steps:
      # 1. Faz checkout do código
      - name: Checkout código
        uses: actions/checkout@v4
      # 2. Configura o Python
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      # 3. Instala as dependências
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      # 4. Gera o pacote distribuível (build)
      - name: Build do pacote
        run: |
          python setup.py sdist
      # 5. Salva o pacote gerado como artifact
      - name: Salvar pacote
        uses: actions/upload-artifact@v4
        with:
          name: pacote-build
          path: dist/*
        if: success()

  deploy:
    needs: [build, notify]  # Só executa após build e notificação
    runs-on: ubuntu-latest
    steps:
      # 1. Faz checkout do código
      - name: Checkout código
        uses: actions/checkout@v4
      # 2. Baixa o pacote buildado do job anterior
      - name: Baixar pacote buildado
        uses: actions/download-artifact@v4
        with:
          name: pacote-build
          path: dist/
      # 3. Cria um release automático no GitHub com o pacote
      - name: Criar release no GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: "Release automática gerada pelo pipeline."
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: build  # Só executa após o build
    runs-on: ubuntu-latest
    steps:
      # 1. Faz checkout do código
      - name: Checkout código
        uses: actions/checkout@v4
      # 2. Configura Python
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      # 3. Cria um script Python para enviar notificação por e-mail
      - name: Enviar notificação por e-mail
        env:
          EMAIL_DESTINATARIO: ${{ secrets.EMAIL_DESTINATARIO }}  # Configurado nas Secrets
          SENHA_EMAIL: ${{ secrets.SENHA_EMAIL }}                 # Senha de app (2FA) do GitHub
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          JOB_STATUS: ${{ job.status }}
        run: |
          python << 'EOF'
          import smtplib
          import os
          from datetime import datetime
          from email.mime.text import MIMEText
          from email.mime.multipart import MIMEMultipart
          
          # Variáveis de ambiente
          email_destinatario = os.getenv("EMAIL_DESTINATARIO")
          senha_email = os.getenv("SENHA_EMAIL")
          github_actor = os.getenv("GITHUB_ACTOR")
          github_repo = os.getenv("GITHUB_REPOSITORY")
          run_id = os.getenv("GITHUB_RUN_ID")
          status = os.getenv("JOB_STATUS")
          
          # Verifica se as credenciais estão configuradas
          if not email_destinatario or not senha_email:
              print("⚠️ Aviso: EMAIL_DESTINATARIO ou SENHA_EMAIL não configurados!")
              exit(0)
          
          # Informações do pipeline
          repo_url = f"https://github.com/{github_repo}"
          pipeline_url = f"{repo_url}/actions/runs/{run_id}"
          timestamp = datetime.now().strftime("%d/%m/%Y às %H:%M:%S")
          
          # Corpo do e-mail
          html_content = f"""
          <html>
            <body style="font-family: Arial, sans-serif;">
              <h2>📊 Status da Pipeline CI/CD</h2>
              <p><strong>Repositório:</strong> <a href="{repo_url}">{github_repo}</a></p>
              <p><strong>Commit por:</strong> {github_actor}</p>
              <p><strong>Status:</strong> <span style="color: {'green' if status == 'success' else 'red'}; font-weight: bold;">{status.upper()}</span></p>
              <p><strong>Data/Hora:</strong> {timestamp}</p>
              <p><strong>Pipeline:</strong> <a href="{pipeline_url}">Ver detalhes</a></p>
              <hr>
              <p style="font-size: 12px; color: #666;">Esta é uma notificação automática gerada pelo GitHub Actions.</p>
            </body>
          </html>
          """
          
          # Configurar e-mail
          msg = MIMEMultipart("alternative")
          msg["Subject"] = f"🔔 Pipeline {'SUCESSO' if status == 'success' else 'FALHOU'}: {github_repo}"
          msg["From"] = email_destinatario
          msg["To"] = email_destinatario
          msg.attach(MIMEText(html_content, "html"))
          
          # Enviar e-mail via SMTP do Gmail
          try:
              server = smtplib.SMTP_SSL("smtp.gmail.com", 465, timeout=10)
              server.login(email_destinatario, senha_email)
              server.sendmail(email_destinatario, email_destinatario, msg.as_string())
              server.quit()
              print(f"✅ E-mail enviado com sucesso para {email_destinatario}")
          except Exception as error:
              print(f"❌ Erro ao enviar e-mail: {error}")
              exit(1)
          EOF
        continue-on-error: true  # Não falha o pipeline se o e-mail não for enviado
