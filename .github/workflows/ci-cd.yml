name: CI/CD Pipeline

# Pipeline de Integração Contínua e Entrega Contínua (CI/CD)
# Etapas: Testes, Build, Notificação e Deploy automático via GitHub Actions

on:
  push:
    branches: [ main ]  # Executa em pushs na main
  pull_request:
    branches: [ main ]  # Executa em PRs para a main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # 1. Faz checkout do código
      - name: Checkout do código
        uses: actions/checkout@v4
      # 2. Configura o Python
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      # 3. Instala as dependências do projeto
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      # 4. Executa os testes unitários e gera relatório em XML
      - name: Executar testes
        run: |
          pytest --junitxml=report.xml
      # 5. Salva o relatório de testes como artifact
      - name: Salvar relatório de testes
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-testes
          path: report.xml

  build:
    needs: test  # Só executa se os testes passarem
    runs-on: ubuntu-latest
    steps:
      # 1. Faz checkout do código
      - name: Checkout código
        uses: actions/checkout@v4
      # 2. Configura o Python
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      # 3. Instala as dependências
      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      # 4. Gera o pacote distribuível (build)
      - name: Build do pacote
        run: |
          python setup.py sdist
      # 5. Salva o pacote gerado como artifact
      - name: Salvar pacote
        uses: actions/upload-artifact@v4
        with:
          name: pacote-build
          path: dist/*
        if: success()

  deploy:
    needs: [build, notify]  # Só executa após build e notificação
    runs-on: ubuntu-latest
    steps:
      # 1. Faz checkout do código
      - name: Checkout código
        uses: actions/checkout@v4
      # 2. Baixa o pacote buildado do job anterior
      - name: Baixar pacote buildado
        uses: actions/download-artifact@v4
        with:
          name: pacote-build
          path: dist/
      # 3. Cria um release automático no GitHub com o pacote
      - name: Criar release no GitHub
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: "Release automática gerada pelo pipeline."
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  notify:
    needs: build  # Só executa após o build
    runs-on: ubuntu-latest
    steps:
      # 1. Envia notificação por e-mail ao final do pipeline
      - name: Notificar por e-mail
        env:
          EMAIL_DESTINO: ${{ secrets.EMAIL_DESTINO }}  # Definido nas Secrets do GitHub
        run: |
          echo "Pipeline finalizado. Status: ${{ job.status }}" | mail -s "Status do Pipeline" "$EMAIL_DESTINO"
